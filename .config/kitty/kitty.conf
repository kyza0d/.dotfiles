# Appearance ------------------------------------
background_opacity 0.94
dynamic_background_opacity yes

window_border_width 1

tab_bar_style hidden

cursor #005F87
cursor_text_color #B4B8C0
cursor_blink_interval 0.6
cursor_beam_thickness 1.5

# Basic colors
foreground           #dfdfe0
background           #161616

selection_foreground #dfdfe0
selection_background #2a2a2a

# Cursor colors
cursor               #78A9FF
cursor_text_color    #282828

# cursor_trail 1
# cursor_trail_decay 0.1 0.6
# cursor_trail_start_threshold 1

repaint_delay 6

# URL underline color when hovering
url_color            #33B1FF

# Window border colors
active_border_color   #272727
inactive_border_color #272727

color0   #282828 
color8   #525252

color1   #EE5396
color9   #FF6B9E

color2   #25be6a
color10  #3FD69A

color3   #08BDBA
color11  #2ECDC8

color4   #78A9FF
color12  #9ABFFF

color5   #BE95FF
color13  #D1B1FF

color6   #33B1FF
color14  #66C6FF

color7   #dfdfe0
color15  #FFFFFF

color16  #3DDBD9
color17  #FF7EB6

# [ Mappings ] -------------------------------------

# Unmap keys
map ctrl+v no_op
map ctrl+shift+l no_op
map ctrl+shift+h no_op
map ctrl+shift+enter no_op
map ctrl+shift+enter no_op
map ctrl+shift+[ no_op
map ctrl+shift+] no_op
map ctrl+shift+n no_op

kitty_mod                       ctrl+shift
map alt+.                       launch --type=overlay --cwd=current zsh -c 'nvim'
map kitty_mod+enter             new_window

# Window navigation
map ctrl+j                      kitten pass_keys.py neighboring_window bottom ctrl+j
map ctrl+k                      kitten pass_keys.py neighboring_window top    ctrl+k
map ctrl+h                      kitten pass_keys.py neighboring_window left   ctrl+h
map ctrl+l                      kitten pass_keys.py neighboring_window right  ctrl+l

# Window resizing
map kitty_mod+j kitten relative_resize.py down  5
map kitty_mod+k kitten relative_resize.py up    5
map kitty_mod+h kitten relative_resize.py left  5
map kitty_mod+l kitten relative_resize.py right 5

# Reset font size
map ctrl+0 change_font_size all 0

# Change font size
# map ctrl+minus change_font_size all -1
# map ctrl+equal change_font_size all +1

# Settings -------------------------------------

# Scrolling
map ctrl+shift+k scroll_line_up
map ctrl+shift+j scroll_line_down

# Pasting
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+c copy_to_clipboard

# Copying
copy_on_select yes

# Cange opacity
map ctrl+shift+, set_background_opacity -0.005
map ctrl+shift+. set_background_opacity +0.005 

# Other settings
listen_on unix:/tmp/mykitty
enabled_layouts tall,grid,stack
enable_audio_bell no

disable_ligatures always

# Fonts -----------------------------------------

include symbols.conf

# Default font
font_family            Source Code Pro
font_size              10.3
modify_font            cell_width 1.2
modify_font            cell_height 8px

modify_font underline_position     6
modify_font underline_thickness    1

box_drawing_scale     0.5, 0.5, 0.5, 0.5

map ctrl+shift+equal   change_font_size all 12.3

# ------------------------------------------------------
# Cartograph CF
# https://connary.com/cartograph.html
# ------------------------------------------------------

font_family            Cartograph CF Extra Light
italic_font            Cartograph CF Extra Light
modify_font            cell_height 11px
modify_font            cell_width 1.9
font_size              10.2
# modify_font            cell_width 1.2
# font_size              9.2
modify_font            baseline -2

